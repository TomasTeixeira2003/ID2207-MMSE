<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Edit User - Swedish Event Planners</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<!-- Navbar -->
<header>
    <nav class="navbar">
        <div class="logo">
            <a th:href="@{/main}">Swedish Event Planners</a>
        </div>
        <ul class="menu">
            <label th:text="'Logged in as: ' + ${user}"></label>
            <li>
                <form method="post" th:action="@{/logout}">
                    <a onclick="this.closest('form').submit();return false;" href="#">Logout</a>
                </form>
            </li>
        </ul>
    </nav>
</header>

<!-- Create User Section -->
<section class="create-user">
    <div class="container">
        <h1>Edit User's Role</h1>
        <form th:action="@{'/user/editUserRole?id='+ ${editedUser.id}}" method="POST">
            <div class="form-group">
                <label for="username">Username:</label>
                <input th:value="${editedUser.username}" type="text" id="username" name="username" required readonly>
            </div>
            <div class="form-group">
                <label for="role">Select Role:</label>
                <select id="role" name="role" required>
                    <option value="" disabled>Select your role</option>
                    <option th:name="role" th:each="role  : ${roles}" th:value="${role}" th:text="${role.label}" th:selected="${editedUser.role == role}"></option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Edit User</button>
        </form>
    </div>
</section>
</body>
</html>
