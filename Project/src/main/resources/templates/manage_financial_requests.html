<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Financial Requests - Swedish Event Planners</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<!-- Navbar -->
<header>
    <nav class="navbar">
        <div class="logo">
            <a th:href="@{/main}">Swedish Event Planners</a>
        </div>
        <ul class="menu">
            <label th:text="'Logged in as: ' + ${user}"></label>
            <li>
                <form method="post" th:action="@{/logout}">
                    <a onclick="this.closest('form').submit();return false;" href="#">Logout</a>
                </form>
            </li>
        </ul>
    </nav>
</header>

<!-- Event Planning Requests Section -->
<section class="event-planning-requests">
    <div class="container">
        <h1>Financial Requests</h1>
        <table>
            <thead>
            <tr>
                <th>Request Reason</th>
                <th>Requested By</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="request : ${requests}">
                <td th:text="${request.reason}"></td>
                <td th:text="${request.createdBy}"></td>
                <td th:text="${request.status.label}"></td>
                <td th:text="${request.priority.label}"></td>
                <td>
                    <div th:if="${request.status.name() == 'OPEN'}">
                        <a th:if="${userRole.name() == 'SERVICES_MANAGER' || userRole.name() == 'PRODUCTION_MANAGER'}" th:href="@{'/financialRequest/editRequest?id=' + ${request.id}}" class="btn">Edit</a>
                        <a th:if="${userRole.name() == 'SERVICES_MANAGER' || userRole.name() == 'PRODUCTION_MANAGER'}" th:href="@{'/financialRequest/sendRequestToFinancialManager?id=' + ${request.id}}" class="btn">Send to Financial Manager</a>
                        <a th:if="${userRole.name() == 'SERVICES_MANAGER' || userRole.name() == 'PRODUCTION_MANAGER'}" th:href="@{'/financialRequest/deleteRequest?id=' + ${request.id}}" class="btn">Delete Request</a>
                        <a th:if="${userRole.name() == 'FINANCIAL_MANAGER'}" th:href="@{'/financialRequest/viewRequest?id=' + ${request.id}}" class="btn">View Request</a>
                        <a th:if="${userRole.name() == 'FINANCIAL_MANAGER'}" th:href="@{'/financialRequest/approveRequest?id=' + ${request.id}}" class="btn">Approve Request</a>
                        <a th:if="${userRole.name() == 'FINANCIAL_MANAGER'}" th:href="@{'/financialRequest/rejectRequest?id=' + ${request.id}}" class="btn">Reject Request</a>
                        <form th:action="@{'/financialRequest/changePriority?id=' + ${request.id}}" method="POST">
                            <select th:name="priority" th:if="${userRole.name() == 'PRODUCTION_MANAGER' || userRole.name() == 'SERVICES_MANAGER'}" onchange="this.closest('form').submit();return false;">
                                <option value="" disabled selected>Select a priority</option>
                                <option th:each="priority  : ${priorities}" th:value="${priority}" th:text="${priority.label}"></option>
                            </select>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
