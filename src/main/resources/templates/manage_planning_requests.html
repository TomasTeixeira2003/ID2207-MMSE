<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Event Planning Requests - Swedish Event Planners</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<!-- Navbar -->
<header>
    <nav class="navbar">
        <div class="logo">
            <a th:href="@{/main}">Swedish Event Planners</a>
        </div>
        <ul class="menu">
            <label th:text="'Logged in as: ' + ${user}"></label>
            <li>
                <form method="post" th:action="@{/logout}">
                    <a onclick="this.closest('form').submit();return false;" href="#">Logout</a>
                </form>
            </li>
        </ul>
    </nav>
</header>

<!-- Event Planning Requests Section -->
<section class="event-planning-requests">
    <div class="container">
        <h1>Event Planning Requests</h1>
        <table>
            <thead>
            <tr>
                <th>Request Title</th>
                <th>Requested By</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="request : ${requests}">
                <td th:text="${request.description}"></td>
                <td th:text="${request.requestedBy}"></td>
                <td th:text="${request.status.label}"></td>
                <td th:text="${request.priority.label}"></td>
                <td>
                    <a href="#edit-request" class="btn">Edit</a>
                    <a href="#delete-request" class="btn" onclick="return confirm('Are you sure you want to delete this request?');">Delete</a>
                    <select onchange="changeStatus(this)">
                        <option value="" disabled selected>Change Status</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <select onchange="changePriority(this)">
                        <option value="" disabled selected>Change Priority</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <a href="#send-event" class="btn">Send Event</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2024 Swedish Event Planners. All rights reserved.</p>
</footer>

<script>
    function changeStatus(select) {
        const selectedValue = select.value;
        // Implement logic for changing the status
        alert(`Status changed to: ${selectedValue}`);
    }

    function changePriority(select) {
        const selectedValue = select.value;
        // Implement logic for changing the priority
        alert(`Priority changed to: ${selectedValue}`);
    }
</script>
</body>
</html>
