<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Swedish Event Planners</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <a th:href="@{/main}">Swedish Event Planners</a>
            </div>
            <ul class="menu">
                <label th:text="'Logged in as: ' + ${user}"></label>
                <li>
                    <form method="post" th:action="@{/logout}">
                        <a onclick="this.closest('form').submit();return false;" href="#">Logout</a>
                    </form>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Dashboard Section -->
    <section class="dashboard" id="dashboard">
        <div class="container">
            <h1>Welcome to the Event Management Portal</h1>
            <p>Create and manage events seamlessly. Track progress, view reports, and more.</p>
        </div>
    </section>

    <!-- Main Content -->
    <section class="main-content">
        <div th:each="page : ${links}" class="content-box">
            <h2 th:text="${page.name}"></h2>
            <p th:text="${page.description}"></p>
            <a th:href="${page.link}" class="btn" th:text="${page.linkText}"></a>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2024 Swedish Event Planners. All rights reserved.</p>
    </footer>
</body>
</html>
