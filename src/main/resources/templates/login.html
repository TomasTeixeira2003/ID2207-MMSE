<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login - Swedish Event Planners</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="#">Swedish Event Planners</a>
            </div>
            <ul class="menu">
                <li><a href="#login" class="active">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- Login Form -->
    <section class="login-section">
        <div class="login-container">
            <h2>Login to Your Account</h2>
            <form th:action="@{/login}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <input type="submit" class="btn"></input>
                <div th:if="${param.loginError}" style="color: red">
                    <br/>
                    <p>Please enter your right credentials!</p>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2024 Swedish Event Planners. All rights reserved.</p>
    </footer>
</body>
</html>
