<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Submitted Tasks - Swedish Event Planners</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<!-- Navbar -->
<header>
    <nav class="navbar">
        <div class="logo">
            <a th:href="@{/main}">Swedish Event Planners</a>
        </div>
        <ul class="menu">
            <label th:text="'Logged in as: ' + ${user}"></label>
            <li>
                <form method="post" th:action="@{/logout}">
                    <a onclick="this.closest('form').submit();return false;" href="#">Logout</a>
                </form>
            </li>
        </ul>
    </nav>
</header>

<!-- Submitted Tasks Section -->
<section class="submitted-tasks">
    <div class="container">
        <h1>Submitted Tasks</h1>
        <table>
            <thead>
            <tr>
                <th>Project Reference</th>
                <th>Description</th>
                <th>Assigned To</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.project}"></td>
                <td th:text="${task.description}"></td>
                <td th:text="${task.assigneeName}"></td>
                <td th:text="${task.status.label}"></td>
                <td th:text="${task.priority.label}"></td>
                <td>
                    <a th:if="${userRole.name() == 'PRODUCTION_MANAGER' || userRole.name() == 'SERVICES_MANAGER'}" th:href="@{'/editTask?id=' + ${task.id}}" class="btn">Edit</a>
                    <form id="assigneeForm" th:action="@{'/changeTaskAssignee?id=' + ${task.id}}" method="POST">
                        <select th:name="assigneeId" th:if="${userRole.name() == 'PRODUCTION_MANAGER' || userRole.name() == 'SERVICES_MANAGER'}" onchange="this.closest('form').submit();return false;">
                            <option value="" disabled selected>Select a user</option>
                            <option th:name="assignee" th:each="sepUser  : ${sepUsers}" th:value="${sepUser.id}" th:text="${sepUser.username}"></option>
                        </select>
                    </form>
                    <form id="statusForm" th:action="@{'/changeTaskStatus?id=' + ${task.id}}" method="POST">
                        <select th:name="status" th:if="${userRole.name() == 'PRODUCTION_SUB_TEAM' || userRole.name() == 'SERVICE_SUB_TEAM'}" onchange="this.closest('form').submit();return false;">
                            <option value="" disabled selected>Change Status</option>
                            <option th:each="status  : ${statuses}" th:value="${status}" th:text="${status.label}"></option>
                        </select>
                    </form>
                    <form id="priorityForm" th:action="@{'/changeTaskPriority?id=' + ${task.id}}" method="POST">
                        <select th:name="priority" th:if="${userRole.name() == 'PRODUCTION_MANAGER' || userRole.name() == 'SERVICES_MANAGER'}" onchange="this.closest('form').submit();return false;">
                            <option value="" disabled selected>Select a priority</option>
                            <option th:each="priority  : ${priorities}" th:value="${priority}" th:text="${priority.label}"></option>
                        </select>
                    </form>
                    <a th:if="${userRole.name() == 'PRODUCTION_MANAGER' || userRole.name() == 'SERVICES_MANAGER'}"  th:href="@{'/deleteTask?id=' + ${task.id}}" class="btn" onclick="return confirm('Are you sure you want to delete this task?');">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2024 Swedish Event Planners. All rights reserved.</p>
</footer>
</body>
</html>
